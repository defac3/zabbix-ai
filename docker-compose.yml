services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    user: "1000:1000"
    ports:
      - "8443:8443" 
    environment:
      OLLAMA_HOST: "127.0.0.1"
      OLLAMA_URL: "http://127.0.0.1:11434"
      OLLAMA_MODEL: "qwen2.5:3b"
      LLM_MAX_RETRIES: 3
    volumes:
      - ./certs:/app/certs:ro
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
          pids: 256
        reservations:
          memory: 2G
    ulimits:
      nofile: 1024

networks:
  internal:
    driver: bridge
    internal: true

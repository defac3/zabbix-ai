services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    user: "1000:1000"
    expose:
      - "8443"
    ports:
      - "8443:8443"
    environment:
      OLLAMA_HOST: "127.0.0.1"
      OLLAMA_URL: "http://127.0.0.1:11434"
      OLLAMA_MODEL: "qwen2.5:3b"
      LLM_MAX_RETRIES: 3
    volumes:
      - ./certs:/app/certs:ro
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          memory: 2G
    ulimits:
      nofile: 1024
    networks:
      - zabbix_net

  webhook:
    build:
      context: .
      dockerfile: webhook/Dockerfile
    expose:
      - "9443"
    ports:
      - "9443:9443"
    volumes:
      - ./certs:/app/certs:ro
    environment:
      API_URL: "https://api:8443"
      ZABBIX_URL: "http://zabbix-web:8080"
      ZABBIX_USER: "Admin"
      ZABBIX_PASSWORD: "zabbix"
      ZABBIX_API_TOKEN: ""
      ZABBIX_SCRIPT_ID: ""
    depends_on:
      - api
    networks:
      - zabbix_net

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix
      POSTGRES_DB: zabbix
    volumes:
      - zabbix_pgdata:/var/lib/postgresql
    expose:
      - "5432"
    networks:
      - zabbix_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zabbix"]
      interval: 5s
      timeout: 5s
      retries: 5

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:latest
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix
      POSTGRES_DB: zabbix
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "10051"
    ports:
      - "10051:10051"
    extra_hosts:
      - "zabbix-agent-debian:10.88.77.10"
      - "zabbix-agent-ubuntu:10.88.77.11"
      - "zabbix-agent-rocky:10.88.77.12"
    networks:
      zabbix_net:
        ipv4_address: 10.88.77.20

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:latest
    environment:
      ZBX_SERVER_HOST: zabbix-server
      DB_SERVER_HOST: postgres
      ZBX_DB_HOST: postgres
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix
      POSTGRES_DB: zabbix
      PHP_TZ: "UTC"
    depends_on:
      - zabbix-server
      - postgres
    expose:
      - "8080"
    ports:
      - "8080:8080"
    networks:
      - zabbix_net

  zabbix-agent-debian:
    build:
      context: .
      dockerfile: zabbix-agent/Dockerfile
      args:
        BASE_IMAGE: debian:latest
    container_name: zabbix-agent-debian
    hostname: agent-debian
    environment:
      ZBX_HOSTNAME: agent-debian
    expose:
      - "10050"
    networks:
      zabbix_net:
        ipv4_address: 10.88.77.10

  zabbix-agent-ubuntu:
    build:
      context: .
      dockerfile: zabbix-agent/Dockerfile
      args:
        BASE_IMAGE: ubuntu:latest
    container_name: zabbix-agent-ubuntu
    hostname: agent-ubuntu
    environment:
      ZBX_HOSTNAME: agent-ubuntu
    expose:
      - "10050"
    networks:
      zabbix_net:
        ipv4_address: 10.88.77.11

  zabbix-agent-rocky:
    build:
      context: .
      dockerfile: zabbix-agent/Dockerfile
      args:
        BASE_IMAGE: almalinux:latest
    container_name: zabbix-agent-rocky
    hostname: agent-rocky
    environment:
      ZBX_HOSTNAME: agent-rocky
    expose:
      - "10050"
    networks:
      zabbix_net:
        ipv4_address: 10.88.77.12

networks:
  zabbix_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.88.77.0/24

volumes:
  zabbix_pgdata: {}
